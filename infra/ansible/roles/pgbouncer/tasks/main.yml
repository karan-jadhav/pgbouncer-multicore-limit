---
- name: Create PgBouncer group
  ansible.builtin.group:
    name: pgbouncer
    system: true

- name: Create PgBouncer user
  ansible.builtin.user:
    name: pgbouncer
    group: pgbouncer
    system: true
    create_home: false
    shell: /usr/sbin/nologin

- name: Install PgBouncer build dependencies
  ansible.builtin.apt:
    name: [build-essential, ca-certificates, libevent-dev, libssl-dev, libsystemd-dev, pandoc, pkg-config]
    state: present
    update_cache: true

- name: Download verified PgBouncer source
  ansible.builtin.get_url:
    url: "https://www.pgbouncer.org/downloads/files/{{ pgbouncer_version }}/pgbouncer-{{ pgbouncer_version }}.tar.gz"
    dest: "/tmp/pgbouncer-{{ pgbouncer_version }}.tar.gz"
    checksum: "sha256:{{ pgbouncer_sha256 }}"
    mode: "0644"

- name: Extract PgBouncer source
  ansible.builtin.unarchive:
    src: "/tmp/pgbouncer-{{ pgbouncer_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/pgbouncer-{{ pgbouncer_version }}/configure"

- name: Configure PgBouncer source
  ansible.builtin.command:
    cmd: "./configure --prefix=/opt/pgbouncer/{{ pgbouncer_version }} --with-systemd"
    chdir: "/tmp/pgbouncer-{{ pgbouncer_version }}"
    creates: "/tmp/pgbouncer-{{ pgbouncer_version }}/config.mak"

- name: Build PgBouncer
  ansible.builtin.command:
    cmd: make -j
    chdir: "/tmp/pgbouncer-{{ pgbouncer_version }}"
    creates: "/tmp/pgbouncer-{{ pgbouncer_version }}/pgbouncer"

- name: Install PgBouncer
  ansible.builtin.command:
    cmd: make install
    chdir: "/tmp/pgbouncer-{{ pgbouncer_version }}"
    creates: "/opt/pgbouncer/{{ pgbouncer_version }}/bin/pgbouncer"

- name: Verify PgBouncer was built with systemd support
  ansible.builtin.command:
    argv: ["/opt/pgbouncer/{{ pgbouncer_version }}/bin/pgbouncer", --version]
  register: pgbouncer_build_version
  changed_when: false
  failed_when: >-
    pgbouncer_build_version.rc != 0 or
    'systemd: yes' not in pgbouncer_build_version.stdout

- name: Point current symlink to pinned PgBouncer
  ansible.builtin.file:
    src: "/opt/pgbouncer/{{ pgbouncer_version }}"
    dest: /opt/pgbouncer/current
    state: link

- name: Create PgBouncer directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: pgbouncer
    group: pgbouncer
    mode: "0750"
  loop:
    - /etc/pgbouncer
    - /etc/pgbouncer/tls
    - /var/log/pgbouncer

- name: Install PgBouncer TLS files
  ansible.builtin.copy:
    src: "{{ tls_local_dir }}/{{ item.src }}"
    dest: "/etc/pgbouncer/tls/{{ item.dest }}"
    owner: pgbouncer
    group: pgbouncer
    mode: "{{ item.mode }}"
  loop:
    - {src: ca.crt, dest: ca.crt, mode: "0644"}
    - {src: pgbouncer.crt, dest: server.crt, mode: "0644"}
    - {src: pgbouncer.key, dest: server.key, mode: "0600"}
  notify: Restart PgBouncer

- name: Install PgBouncer authentication file
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../pgbouncer/config/users.txt.j2"
    dest: /etc/pgbouncer/users.txt
    owner: pgbouncer
    group: pgbouncer
    mode: "0600"
  no_log: true
  notify: Restart PgBouncer

- name: Read physical CPU representatives
  ansible.builtin.shell: lscpu -p=CPU,CORE,SOCKET | awk -F, '!/^#/ && !seen[$2 FS $3]++ {print $1}'
  args:
    executable: /bin/bash
  register: physical_cpus
  changed_when: false

- name: Verify sufficient physical cores
  ansible.builtin.assert:
    that: physical_cpus.stdout_lines | length >= pgbouncer_reserved_physical_cores + 8
    fail_msg: PgBouncer host does not expose enough distinct physical cores for eight pinned processes.

- name: Install PgBouncer systemd template
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../pgbouncer/systemd/pgbouncer@.service"
    dest: /etc/systemd/system/pgbouncer@.service
    mode: "0644"
  notify: Reload systemd

- name: Create per-instance systemd drop-in directories
  ansible.builtin.file:
    path: "/etc/systemd/system/pgbouncer@{{ item }}.service.d"
    state: directory
    mode: "0755"
  loop: "{{ range(1, 9) | list }}"

- name: Pin each PgBouncer instance to a distinct physical core
  ansible.builtin.copy:
    dest: "/etc/systemd/system/pgbouncer@{{ item }}.service.d/cpu.conf"
    mode: "0644"
    content: |
      [Service]
      CPUAffinity={{ physical_cpus.stdout_lines[pgbouncer_reserved_physical_cores + item - 1] }}
  loop: "{{ range(1, 9) | list }}"
  notify: Reload systemd

- name: Configure the active PgBouncer topology
  ansible.builtin.import_tasks: runtime.yml
