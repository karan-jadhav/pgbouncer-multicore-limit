name: focused-secondary
repeats: 1
randomize: true
randomization_seed: 3003
defaults: {duration: 60, warmup: 20, connections: 256, id_range_end: 20000000}
runs:
  - {id: tls-none, mode: api, pgbouncer_processes: 1, client_tls_sslmode: disable, server_tls_sslmode: disable, args: {model: closed-loop, tls_mode: disable}}
  - {id: tls-client, mode: api, pgbouncer_processes: 1, client_tls_sslmode: require, server_tls_sslmode: disable, args: {model: closed-loop, tls_mode: verify-full}}
  - {id: tls-server, mode: api, pgbouncer_processes: 1, client_tls_sslmode: disable, server_tls_sslmode: verify-full, args: {model: closed-loop, tls_mode: disable}}
  - {id: tls-both, mode: api, pgbouncer_processes: 1, client_tls_sslmode: require, server_tls_sslmode: verify-full, args: {model: closed-loop, tls_mode: verify-full}}
  - {id: cancel-one, mode: cancel, pgbouncer_processes: 1, args: {count: 100, duration: 30, warmup: 0, tls_mode: verify-full}}
  - {id: cancel-four-no-peering, mode: cancel, pgbouncer_processes: 4, peering_enabled: false, args: {count: 100, duration: 30, warmup: 0, tls_mode: verify-full}}
  - {id: cancel-four-peering, mode: cancel, pgbouncer_processes: 4, args: {count: 100, duration: 30, warmup: 0, tls_mode: verify-full}}
